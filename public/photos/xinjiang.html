<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新疆摄影 | 任文浩的个人主页</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/background.css">
    <link rel="stylesheet" href="../assets/css/xinjiang-gallery.css">
</head>
<body>
    <!-- Xinjiang Gallery -->
    <div class="xinjiang-gallery">

        <!-- Touch Zones for Click Navigation -->
        <div class="xg-touch-zone xg-touch-zone--prev" aria-label="上一张"></div>
        <div class="xg-touch-zone xg-touch-zone--next" aria-label="下一张"></div>

        <!-- Photo Stage -->
        <div class="xg-stage">
            <div class="xg-photo-container">

                <!-- Photo 1: 天山山脉 -->
                <div class="xg-photo active"
                     data-title="天山山脉"
                     data-subtitle="巍峨的天山雪峰耸立在蓝天白云之下，展现出新疆独特的壮美自然风光。"
                     data-location="新疆天山"
                     data-date="2023年夏"
                     data-camera="Canon EOS R5"
                     data-settings="f/8, 1/500s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/3408354/pexels-photo-3408354.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="天山山脉" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 喀纳斯湖 -->
                <div class="xg-photo"
                     data-title="喀纳斯湖"
                     data-subtitle="高山湖泊的湖水呈现出独特的蓝绿色，周围环绕着茂密的森林，宛如人间仙境。"
                     data-location="阿勒泰地区"
                     data-date="2023年秋"
                     data-camera="Sony A7R IV"
                     data-settings="f/11, 1/250s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2187605/pexels-photo-2187605.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="喀纳斯湖" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 塔克拉玛干沙漠 -->
                <div class="xg-photo"
                     data-title="塔克拉玛干沙漠"
                     data-subtitle="金色的沙丘连绵起伏，在夕阳下呈现出壮美的线条，展现出大漠的雄浑与神秘。"
                     data-location="巴音郭楞"
                     data-date="2022年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/16, 1/125s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="塔克拉玛干沙漠" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 那拉提草原 -->
                <div class="xg-photo"
                     data-title="那拉提草原"
                     data-subtitle="辽阔的草原绿草如茵，成群的牛羊点缀其间，展现出新疆牧场的生机与活力。"
                     data-location="伊犁地区"
                     data-date="2023年夏"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/8, 1/320s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1166209/pexels-photo-1166209.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="那拉提草原" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 库车大峡谷 -->
                <div class="xg-photo"
                     data-title="库车大峡谷"
                     data-subtitle="红色的岩壁高耸入云，峡谷深邃神秘，光影交错间呈现出大自然的鬼斧神工。"
                     data-location="阿克苏地区"
                     data-date="2022年夏"
                     data-camera="Sony A7R IV"
                     data-settings="f/11, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="库车大峡谷" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 6: 赛里木湖 -->
                <div class="xg-photo"
                     data-title="赛里木湖"
                     data-subtitle="被称为"大西洋最后一滴眼泪"的高山湖泊，湖水湛蓝如镜，倒映着雪山与天空。"
                     data-location="博尔塔拉"
                     data-date="2023年春"
                     data-camera="Canon EOS R3"
                     data-settings="f/8, 1/400s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2187605/pexels-photo-2187605.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="赛里木湖" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 7: 沙漠日落 -->
                <div class="xg-photo"
                     data-title="沙漠日落"
                     data-subtitle="夕阳西下，金色的阳光洒在沙丘上，营造出温暖而宁静的氛围。"
                     data-location="吐鲁番"
                     data-date="2022年秋"
                     data-camera="Sony A7S III"
                     data-settings="f/2.8, 1/100s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="沙漠日落" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 慕士塔格峰 -->
                <div class="xg-photo"
                     data-title="慕士塔格峰"
                     data-subtitle="冰山之父矗立在帕米尔高原之上，银白的雪峰与蓝天形成鲜明对比。"
                     data-location="喀什地区"
                     data-date="2023年夏"
                     data-camera="Nikon Z7 II"
                     data-settings="f/11, 1/250s, ISO 64">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/3408354/pexels-photo-3408354.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="慕士塔格峰" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 9: 胡杨林 -->
                <div class="xg-photo"
                     data-title="胡杨林"
                     data-subtitle="千年不死的胡杨树在金秋时节呈现出金黄色的壮观景象，展现出生命的顽强与美丽。"
                     data-location="巴楚"
                     data-date="2022年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/8, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2187605/pexels-photo-2187605.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="胡杨林" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 10: 薰衣草花海 -->
                <div class="xg-photo"
                     data-title="薰衣草花海"
                     data-subtitle="伊犁河谷的薰衣草花海如紫色的海洋，香气四溢，仿佛置身于普罗旺斯。"
                     data-location="伊犁霍城"
                     data-date="2023年夏"
                     data-camera="Fujifilm GFX 100S"
                     data-settings="f/5.6, 1/500s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1166209/pexels-photo-1166209.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="薰衣草花海" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 11: 银河星空 -->
                <div class="xg-photo"
                     data-title="银河星空"
                     data-subtitle="在远离城市灯光的新疆腹地，银河如璀璨的丝带横跨夜空，繁星点点美不胜收。"
                     data-location="禾木"
                     data-date="2022年冬"
                     data-camera="Sony A7S III"
                     data-settings="f/2.8, 25s, ISO 3200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="银河星空" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 12: 独库公路 -->
                <div class="xg-photo"
                     data-title="独库公路"
                     data-subtitle="穿越天山山脉的壮美公路，一日内经历四季，沿途风景如画，令人惊叹。"
                     data-location="独山子至库车"
                     data-date="2023年夏"
                     data-camera="Canon EOS R5"
                     data-settings="f/11, 1/320s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/3408354/pexels-photo-3408354.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="独库公路" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 13: 巴音布鲁克 -->
                <div class="xg-photo"
                     data-title="巴音布鲁克"
                     data-subtitle="九曲十八弯的开都河在草原上蜿蜒流淌，夕阳时分可见九个太阳的奇观。"
                     data-location="和静县"
                     data-date="2023年夏"
                     data-camera="Nikon Z7 II"
                     data-settings="f/8, 1/160s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2187605/pexels-photo-2187605.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="巴音布鲁克" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 14: 喀什古城 -->
                <div class="xg-photo"
                     data-title="喀什古城"
                     data-subtitle="保存完好的古城充满维吾尔族风情，迷宫般的街巷散发着浓厚的历史气息。"
                     data-location="喀什市"
                     data-date="2022年秋"
                     data-camera="Sony A7R IV"
                     data-settings="f/4, 1/200s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="喀什古城" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 15: 杏花沟 -->
                <div class="xg-photo"
                     data-title="杏花沟"
                     data-subtitle="春天野杏花开满山谷，粉白色的花海与远处的雪山相映成趣，如诗如画。"
                     data-location="吐尔根"
                     data-date="2023年春"
                     data-camera="Canon EOS R3"
                     data-settings="f/5.6, 1/400s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1166209/pexels-photo-1166209.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="杏花沟" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 16: 五彩滩 -->
                <div class="xg-photo"
                     data-title="五彩滩"
                     data-subtitle="夕阳下的五彩滩呈现出斑斓的色彩，雅丹地貌与碧蓝的河水构成独特的景观。"
                     data-location="布尔津"
                     data-date="2022年秋"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/8, 1/125s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/3408354/pexels-photo-3408354.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="五彩滩" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Back Button -->
        <a href="../photos.html" class="xg-back" aria-label="返回相册">
            <span class="xg-back-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </span>
            <span class="xg-back-text">返回</span>
        </a>

        <!-- Photo Counter -->
        <div class="xg-counter" aria-live="polite">
            <span class="xg-counter-current">01</span>
            <span class="xg-counter-separator">/</span>
            <span class="xg-counter-total">16</span>
        </div>

        <div class="xg-info" role="region" aria-label="照片信息">
            <h2 class="xg-title"></h2>
            <p class="xg-subtitle"></p>
            <div class="xg-divider"></div>

                <div class="xg-meta-item">
                    <span class="xg-meta-icon">

                    </span>
                    <div class="xg-meta-content">
                        <span class="xg-meta-label">位置</span>
                        <span class="xg-meta-value" data-field="location"></span>

                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                </div>
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>

                        <span class="xg-meta-value" data-field="settings"></span>

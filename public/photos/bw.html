<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑白摄影 | 任文浩的个人主页</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Styles -->

    <link rel="stylesheet" href="../assets/css/background.css">
    <link rel="stylesheet" href="../assets/css/xinjiang-gallery.css">
</head>
<body>
    <!-- Xinjiang Gallery -->
    <div class="xinjiang-gallery">

        <!-- Touch Zones for Click Navigation -->
        <div class="xg-touch-zone xg-touch-zone--prev" aria-label="上一张"></div>
        <div class="xg-touch-zone xg-touch-zone--next" aria-label="下一张"></div>

        <!-- Photo Stage -->
        <div class="xg-stage">
            <div class="xg-photo-container">

                <!-- Photo 1: 光影建筑 -->
                <div class="xg-photo active"
                     data-title="光影建筑"
                     data-subtitle="去掉色彩的干扰，建筑的几何线条与光影更加纯粹。"
                     data-location="北京胡同"
                     data-date="2023年冬"
                     data-camera="Leica M10"
                     data-settings="f/5.6, 1/250s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/785/pexels-photo-785.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="光影建筑" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 自然纹理 -->
                <div class="xg-photo"
                     data-title="自然纹理"
                     data-subtitle="斑马的条纹在黑白中呈现出大自然的抽象艺术。"
                     data-location="肯尼亚马赛马拉"
                     data-date="2022年夏"
                     data-camera="Sony A7R IV"
                     data-settings="f/8, 1/500s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/36478/amazing-animal-beautiful-beautifull.jpg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="自然纹理" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 人物肖像 -->
                <div class="xg-photo"
                     data-title="人物肖像"
                     data-subtitle="黑白色调让人物的神情与气质更加突出，画面更有力量。"
                     data-location="上海"
                     data-date="2023年春"
                     data-camera="Canon EOS R3"
                     data-settings="f/2.8, 1/125s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/4350171/pexels-photo-4350171.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="人物肖像" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 街头瞬间 -->
                <div class="xg-photo"
                     data-title="街头瞬间"
                     data-subtitle="城市的喧嚣在黑白中沉淀为永恒的瞬间。"
                     data-location="上海南京路"
                     data-date="2022年冬"
                     data-camera="Leica Q2"
                     data-settings="f/4, 1/250s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1223649/pexels-photo-1223649.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="街头瞬间" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 大地轮廓 -->
                <div class="xg-photo"
                     data-title="大地轮廓"
                     data-subtitle="山峦的起伏在黑白中化作纯粹的线条与层次。"
                     data-location="张家界"
                     data-date="2023年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/11, 1/125s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/235734/pexels-photo-235734.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="大地轮廓" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 6: 咖啡馆时光 -->
                <div class="xg-photo"

                     data-subtitle="一杯咖啡的剪影，在光影中诉说悠闲的午后。"
                     data-location="北京三里屯"
                     data-date="2023年冬"
                     data-camera="Leica M10"
                     data-settings="f/2, 1/125s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/3493777/pexels-photo-3493777.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="咖啡馆时光" loading="lazy">

                    </div>

                     data-date="2022年秋"
                     data-camera="Canon EOS R5"

                        <img src="https://images.pexels.com/photos/7148444/pexels-photo-7148444.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="劳动者" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 钢铁森林 -->

                     data-location="北京CBD"
                     data-date="2023年夏"
                     data-camera="Sony A7R IV"
                     data-settings="f/8, 1/400s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1105666/pexels-photo-1105666.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="钢铁森林" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 9: 枯木逢春 -->
                <div class="xg-photo"

                     data-date="2022年冬"
                     data-camera="Nikon Z7 II"
                     data-settings="f/11, 1/250s">

                    </div>

                </div>

                    </div>
                </div>

                <!-- Photo 13: 桥韵 -->
                <div class="xg-photo"
                     data-title="桥韵"
                     data-subtitle="赵州桥的弧线在黑白中尽显古建筑的优雅与智慧。"
                     data-location="河北赵县"
                     data-date="2023年春"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/8, 1/200s">

                        <img src="https://images.pexels.com/photos/1141853/pexels-photo-1141853.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="桥韵" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 14: 海浪 -->
                <div class="xg-photo"
                     data-title="海浪"
                     data-subtitle="黑白镜头下的海浪，展现出大海的力量与韵律。"
                     data-location="福建霞浦"
                     data-date="2022年夏"
                     data-camera="Sony A7S III"
                     data-settings="f/16, 1/8s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1346472/pexels-photo-1346472.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="海浪" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 15: 禅意 -->
                <div class="xg-photo"
                     data-title="禅意"
                     data-subtitle="佛像的轮廓在光影中散发出宁静与庄严。"
                     data-location="洛阳龙门石窟"
                     data-date="2023年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/4, 1/160s">

                        <img src="https://images.pexels.com/photos/461%20canto/pexels-photo-461%20canto.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="禅意" loading="lazy">

                    </div>

                <div class="xg-photo"
                     data-title="暮色剪影"
                     data-subtitle="夕阳下的剪影，在黑白中凝固成一幅永恒的画面。"
                     data-location="北京故宫"
                     data-date="2022年冬"
                     data-camera="Leica Q2"
                     data-settings="f/8, 1/1000s">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/785/pexels-photo-785.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="暮色剪影" loading="lazy">

                    </div>

        <a href="../photos.html" class="xg-back" aria-label="返回相册">

            <span class="xg-counter-separator">/</span>
            <span class="xg-counter-total">16</span>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秋色摄影 | 任文浩的个人主页</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/background.css">
    <link rel="stylesheet" href="../assets/css/xinjiang-gallery.css">
</head>
<body>
    <!-- Xinjiang Gallery -->
    <div class="xinjiang-gallery">

        <!-- Touch Zones for Click Navigation -->
        <div class="xg-touch-zone xg-touch-zone--prev" aria-label="上一张"></div>
        <div class="xg-touch-zone xg-touch-zone--next" aria-label="下一张"></div>

        <!-- Photo Stage -->
        <div class="xg-stage">
            <div class="xg-photo-container">

                <!-- Photo 1: 银杏大道 -->
                <div class="xg-photo active"
                     data-title="银杏大道"
                     data-subtitle="金黄色的银杏叶铺满整条大道，阳光穿过树叶洒下斑驳的光影。"
                     data-location="北京钓鱼台"
                     data-date="2023年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/8, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2292919/pexels-photo-2292919.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="银杏大道" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 香山红叶 -->
                <div class="xg-photo"
                     data-title="香山红叶"
                     data-subtitle="漫山遍野的红叶如火如荼，秋风吹过，枫叶纷纷飘落如蝴蝶起舞。"
                     data-location="北京香山"
                     data-date="2023年秋"
                     data-camera="Sony A7R IV"
                     data-settings="f/5.6, 1/320s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1684425/pexels-photo-1684425.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="香山红叶" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 坝上草原 -->
                <div class="xg-photo"
                     data-title="坝上草原"
                     data-subtitle="秋天的草原金黄一片，远处白色的风车缓缓转动，构成一幅宁静的田园诗画。"
                     data-location="河北塞罕坝"
                     data-date="2022年秋"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/8, 1/400s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/355bot/pexels-photo-355bot.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="坝上草原" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 层林尽染 -->
                <div class="xg-photo"
                     data-title="层林尽染"
                     data-subtitle="从山顶俯瞰，秋色从绿色渐变到金黄再到火红，大自然的调色盘在此完美展现。"
                     data-location="四川米亚罗"
                     data-date="2023年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/11, 1/250s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1148998/pexels-photo-1148998.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="层林尽染" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 秋水长天 -->
                <div class="xg-photo"
                     data-title="秋水长天"
                     data-subtitle="湖面如镜，倒映着岸边金黄的树木，天水一色，美得令人窒息。"
                     data-location="江西婺源"
                     data-date="2022年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/8, 1/160s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1477425/pexels-photo-1477425.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="秋水长天" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 6: 枫林小径 -->
                <div class="xg-photo"
                     data-title="枫林小径"
                     data-subtitle="铺满落叶的小径蜿蜒向前，两旁是火红的枫树，仿佛走进了一幅油画。"
                     data-location="南京栖霞山"
                     data-date="2023年秋"
                     data-camera="Sony A7R IV"
                     data-settings="f/4, 1/200s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1671325/pexels-photo-1671325.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="枫林小径" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 7: 晨雾秋林 -->
                <div class="xg-photo"
                     data-title="晨雾秋林"
                     data-subtitle="清晨的薄雾笼罩着秋林，阳光透过雾气洒下金色光芒，如梦如幻。"
                     data-location="安徽黄山"
                     data-date="2022年秋"
                     data-camera="Canon EOS R3"
                     data-settings="f/5.6, 1/125s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2506923/pexels-photo-2506923.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="晨雾秋林" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 秋山巍峨 -->
                <div class="xg-photo"
                     data-title="秋山巍峨"
                     data-subtitle="秋天的山脉色彩斑斓，雪峰、松林、红叶交相辉映，气势磅礴。"
                     data-location="吉林长白山"
                     data-date="2023年秋"
                     data-camera="Fujifilm GFX 100S"
                     data-settings="f/11, 1/320s, ISO 64">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1562/italian-landscape-mountains-nature.jpg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="秋山巍峨" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 9: 湖畔秋色 -->
                <div class="xg-photo"
                     data-title="湖畔秋色"
                     data-subtitle="湖水倒映着岸边的秋树，橙红金黄交织，如同打翻的颜料盘。"
                     data-location="云南泸沽湖"
                     data-date="2022年秋"
                     data-camera="Sony A7R IV"
                     data-settings="f/8, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/589/forest-fall-colors-trees.jpg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="湖畔秋色" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 10: 枫叶脉络 -->
                <div class="xg-photo"
                     data-title="枫叶脉络"
                     data-subtitle="特写镜头下的枫叶，清晰的脉络和完美的形状，展现秋日精灵的精致美感。"
                     data-location="苏州天平山"
                     data-date="2023年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/2.8, 1/500s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1141853/pexels-photo-1141853.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="枫叶脉络" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 11: 金色小路 -->
                <div class="xg-photo"
                     data-title="金色小路"
                     data-subtitle="林间的土路被落叶铺成金色地毯，阳光从树梢间洒落，温暖而宁静。"
                     data-location="辽宁关门山"
                     data-date="2022年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/5.6, 1/160s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1405528/pexels-photo-1405528.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="金色小路" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 12: 柿子红了 -->
                <div class="xg-photo"
                     data-title="柿子红了"
                     data-subtitle="农家院里的柿子树上挂满了红彤彤的柿子，秋收的喜悦溢于言表。"
                     data-location="陕西延安"
                     data-date="2023年秋"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/4, 1/250s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/461%20canto/pexels-photo-461%20canto.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="柿子红了" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 13: 秋日夕阳 -->
                <div class="xg-photo"
                     data-title="秋日夕阳"
                     data-subtitle="秋天的夕阳格外温柔，金色的余晖洒满大地，拉出长长的影子。"
                     data-location="内蒙古额济纳"
                     data-date="2022年秋"
                     data-camera="Sony A7S III"
                     data-settings="f/8, 1/125s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1562/italian-landscape-mountains-nature.jpg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="秋日夕阳" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 14: 金色胡杨 -->
                <div class="xg-photo"
                     data-title="金色胡杨"
                     data-subtitle="千年不死的胡杨林在秋天变成金黄色，在沙漠中展现出生命的顽强与美丽。"
                     data-location="甘肃金塔"
                     data-date="2023年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/11, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/589/forest-fall-colors-trees.jpg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="金色胡杨" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 15: 落叶归根 -->
                <div class="xg-photo"
                     data-title="落叶归根"
                     data-subtitle="秋风起，落叶纷飞，金黄的叶子在空中旋转起舞，最终回归大地的怀抱。"
                     data-location="杭州西湖"
                     data-date="2022年秋"
                     data-camera="Sony A7R IV"
                     data-settings="f/4, 1/500s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1141853/pexels-photo-1141853.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="落叶归根" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 16: 深秋月色 -->
                <div class="xg-photo"
                     data-title="深秋月色"
                     data-subtitle="深秋的夜晚，月光洒在残留的红叶上，寂静而诗意，奏响秋天的尾声。"
                     data-location="北京颐和园"
                     data-date="2023年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/2.8, 1/30s, ISO 1600">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2292919/pexels-photo-2292919.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="深秋月色" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Back Button -->
        <a href="../photos.html" class="xg-back" aria-label="返回相册">
            <span class="xg-back-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </span>
            <span class="xg-back-text">返回</span>
        </a>

        <!-- Photo Counter -->
        <div class="xg-counter" aria-live="polite">
            <span class="xg-counter-current">01</span>
            <span class="xg-counter-separator">/</span>
            <span class="xg-counter-total">16</span>
        </div>

        <!-- Info Panel -->
        <div class="xg-info" role="region" aria-label="照片信息">
            <h2 class="xg-title"></h2>
            <p class="xg-subtitle"></p>
            <div class="xg-divider"></div>
            <div class="xg-metadata">
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </span>
                    <div class="xg-meta-content">
                        <span class="xg-meta-label">位置</span>
                        <span class="xg-meta-value" data-field="location"></span>
                    </div>
                </div>
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    </span>

                        <span class="xg-meta-label">时间</span>
                        <span class="xg-meta-value" data-field="date"></span>
                    </div>
                </div>
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>

                    <div class="xg-meta-content">
                        <span class="xg-meta-label">相机</span>

                    <span class="xg-meta-icon">

                    </span>
                    <div class="xg-meta-content">
                        <span class="xg-meta-label">参数</span>
                        <span class="xg-meta-value" data-field="settings"></span>
                    </div>
                </div>
            </div>

        <button class="xg-info-toggle" aria-label="显示照片信息">

                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>

        <!-- Navigation -->
        <div class="xg-nav visible" role="navigation" aria-label="照片导航">
            <button class="xg-nav-btn xg-prev" aria-label="上一张" disabled>

                    <polyline points="18 15 12 9 6 15"/>

        <div class="xg-progress visible" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="16">

        <div class="xg-keyboard-hints" aria-label="键盘快捷键">

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜景/星空摄影 | 任文浩的个人主页</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/background.css">

<body>
    <!-- Xinjiang Gallery -->
    <div class="xinjiang-gallery">

        <!-- Touch Zones for Click Navigation -->
        <div class="xg-touch-zone xg-touch-zone--prev" aria-label="上一张"></div>
        <div class="xg-touch-zone xg-touch-zone--next" aria-label="下一张"></div>

        <!-- Photo Stage -->
        <div class="xg-stage">
            <div class="xg-photo-container">

                <!-- Photo 1: 银河之下 -->
                <div class="xg-photo active"
                     data-title="银河之下"
                     data-subtitle="繁星点缀的夜空，银河横跨天际，让人感受到宇宙的浩瀚与宁静。"
                     data-location="青海茶卡盐湖"
                     data-date="2023年夏"
                     data-camera="Sony A7S III"
                     data-settings="f/2.8, 25s, ISO 3200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/955137/pexels-photo-955137.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="银河之下" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 都市光影 -->
                <div class="xg-photo"
                     data-title="都市光影"
                     data-subtitle="霓虹闪烁的城市夜景，车流如织，光轨交织成现代都市的脉络。"
                     data-location="上海外滩"
                     data-date="2023年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/11, 8s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1407006/pexels-photo-1407006.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="都市光影" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 星轨 -->
                <div class="xg-photo"
                     data-title="星轨"
                     data-subtitle="长时间的曝光记录下星星运行的轨迹，呈现出宇宙运动的神秘轨迹。"
                     data-location="敦煌鸣沙山"
                     data-date="2022年夏"
                     data-camera="Nikon Z7 II"
                     data-settings="f/4, 30min, ISO 800">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/99869/pexels-photo-99869.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="星轨" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 月照大地 -->
                <div class="xg-photo"
                     data-title="月照大地"
                     data-subtitle="月光洒在山峦之上，天地间一片静谧与祥和。"
                     data-location="云南泸沽湖"
                     data-date="2023年春"
                     data-camera="Sony A7R IV"
                     data-settings="f/5.6, 15s, ISO 1600">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/247671/pexels-photo-247671.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="月照大地" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 极光之舞 -->
                <div class="xg-photo"
                     data-title="极光之舞"
                     data-subtitle="绿色的极光在夜空中舞动，如同大自然的灯光秀。"
                     data-location="冰岛雷克雅未克"
                     data-date="2023年冬"
                     data-camera="Canon EOS R3"
                     data-settings="f/2.8, 10s, ISO 2000">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1625406/pexels-photo-1625406.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="极光之舞" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 6: 灯火阑珊 -->
                <div class="xg-photo"
                     data-title="灯火阑珊"
                     data-subtitle="夜色中的城市灯火，温暖的光芒照亮归家的路。"
                     data-location="北京CBD"
                     data-date="2023年冬"
                     data-camera="Sony A7S III"
                     data-settings="f/2.8, 4s, ISO 800">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2832042/pexels-photo-2832042.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="灯火阑珊" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 7: 烟花绽放 -->
                <div class="xg-photo"
                     data-title="烟花绽放"
                     data-subtitle="节日的烟花在夜空中绽放，五彩斑斓照亮人们的脸庞。"
                     data-location="香港维多利亚港"
                     data-date="2023年春节"
                     data-camera="Nikon Z7 II"
                     data-settings="f/8, 2s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1248583/pexels-photo-1248583.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="烟花绽放" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 夜港 -->
                <div class="xg-photo"
                     data-title="夜港"
                     data-subtitle="港口的夜色，货船灯火通明，倒影在平静的水面上。"
                     data-location="上海洋山港"
                     data-date="2022年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/5.6, 10s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/35600/germany-hamburg-warehouse.jpg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="夜港" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 9: 流星划过 -->
                <div class="xg-photo"
                     data-title="流星划过"
                     data-subtitle="英仙座流星雨划过夜空，短暂而璀璨的瞬间被镜头定格。"
                     data-location="内蒙古额济纳"
                     data-date="2023年夏"
                     data-camera="Sony A7S III"
                     data-settings="f/1.4, 15s, ISO 6400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2387793/pexels-photo-2387793.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="流星划过" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 10: 桥之光 -->
                <div class="xg-photo"
                     data-title="桥之光"
                     data-subtitle="夜幕下的桥梁被灯光勾勒出优美的线条，倒影在水中如梦似幻。"
                     data-location="广州猎德桥"
                     data-date="2023年夏"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/8, 6s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1564325/pexels-photo-1564325.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="桥之光" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                     data-location="四川康定"
                     data-date="2023年春"
                     data-camera="Canon EOS R3"
                     data-settings="f/2.8, 20s, ISO 2500">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2387794/pexels-photo-2387794.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="银河升起" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 12: 夜幕下的都市 -->
                <div class="xg-photo"
                     data-title="夜幕下的都市"
                     data-subtitle="从高空俯瞰城市的夜景，万家灯火如同繁星洒落人间。"
                     data-location="深圳平安大厦"
                     data-date="2023年冬"
                     data-camera="Sony A7R IV"
                     data-settings="f/8, 8s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2417726/pexels-photo-2417726.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="夜幕下的都市" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 13: 路灯之下 -->
                <div class="xg-photo"
                     data-title="路灯之下"
                     data-subtitle="昏黄的路灯在夜色中散发出温暖的光芒，照亮归人的路。"
                     data-location="杭州西湖"
                     data-date="2022年冬"
                     data-camera="Leica M10"
                     data-settings="f/2, 1/30s, ISO 1600">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/3358707/pexels-photo-3358707.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="路灯之下" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 14: 北半球星空 -->
                <div class="xg-photo"
                     data-title="北半球星空"
                     data-subtitle="繁星闪烁的夜空，星座清晰可见，感受星空的浩瀚与神秘。"
                     data-location="西藏纳木错"
                     data-date="2023年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/2.8, 20s, ISO 3200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1105666/pexels-photo-1105666.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="北半球星空" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 15: 夜行之路 -->
                <div class="xg-photo"
                     data-title="夜行之路"
                     data-subtitle="蜿蜒的道路在夜色中延伸，路灯如星火指引前行的方向。"
                     data-location="张家界天门山"
                     data-date="2023年夏"
                     data-camera="Canon EOS R5"
                     data-settings="f/11, 15s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1545747/pexels-photo-1545747.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="夜行之路" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 16: 夜之魅 -->
                <div class="xg-photo"
                     data-title="夜之魅"
                     data-subtitle="夜色中的奇妙景象，光影交织间展现出夜晚独有的魅力与梦幻。"
                     data-location="重庆洪崖洞"
                     data-date="2023年春"
                     data-camera="Sony A7III"
                     data-settings="f/4, 4s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/3389863/pexels-photo-3389863.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="夜之魅" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

            </div>

        <a href="../photos.html" class="xg-back" aria-label="返回相册">

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随拍摄影 | 任文浩的个人主页</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/background.css">
    <link rel="stylesheet" href="../assets/css/xinjiang-gallery.css">
</head>
<body>
    <!-- Xinjiang Gallery -->
    <div class="xinjiang-gallery">

        <!-- Touch Zones for Click Navigation -->
        <div class="xg-touch-zone xg-touch-zone--prev" aria-label="上一张"></div>
        <div class="xg-touch-zone xg-touch-zone--next" aria-label="下一张"></div>

        <!-- Photo Stage -->
        <div class="xg-stage">
            <div class="xg-photo-container">

                <!-- Photo 1: 街角时光 -->
                <div class="xg-photo active"
                     data-title="街角时光"
                     data-subtitle="捕捉城市街角的日常瞬间，光影交织间展现出生活的真实与美好。"
                     data-location="北京三里屯"
                     data-date="2023年春"
                     data-camera="Sony A7III"
                     data-settings="f/2.8, 1/200s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1223649/pexels-photo-1223649.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="街角时光" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 咖啡馆一角 -->
                <div class="xg-photo"
                     data-title="咖啡馆一角"
                     data-subtitle="温暖灯光下的咖啡馆，一本书一杯咖啡，偷得浮生半日闲。"
                     data-location="上海"
                     data-date="2023年夏"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/2, 1/125s, ISO 800">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/357467/pexels-photo-357467.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="咖啡馆一角" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 地铁众生 -->
                <div class="xg-photo"
                     data-title="地铁众生"
                     data-subtitle="地铁车厢内的百态人生，每个人都有自己的故事和目的地。"
                     data-location="北京地铁"
                     data-date="2022年冬"
                     data-camera="Canon EOS R5"
                     data-settings="f/4, 1/160s, ISO 1600">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/169647/pexels-photo-169647.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="地铁众生" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 雨后街道 -->
                <div class="xg-photo"
                     data-title="雨后街道"
                     data-subtitle="雨后的街道反射着霓虹灯光，行人匆匆，画面充满城市的律动感。"
                     data-location="广州"
                     data-date="2023年夏"
                     data-camera="Sony A7R IV"
                     data-settings="f/2.8, 1/100s, ISO 800">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/210607/pexels-photo-210607.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="雨后街道" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 晨练时光 -->
                <div class="xg-photo"
                     data-title="晨练时光"
                     data-subtitle="公园里晨练的老人，打太极的身影在晨光中显得格外从容。"
                     data-location="北京朝阳公园"
                     data-date="2023年春"
                     data-camera="Nikon Z7 II"
                     data-settings="f/5.6, 1/320s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1148998/pexels-photo-1148998.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="晨练时光" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 6: 夜市烟火 -->
                <div class="xg-photo"
                     data-title="夜市烟火"
                     data-subtitle="热闹的夜市充满了烟火气，美食的香气和人们的笑声交织在一起。"
                     data-location="成都宽窄巷子"
                     data-date="2022年秋"
                     data-camera="Sony A7S III"
                     data-settings="f/2.8, 1/60s, ISO 1600">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1251175/pexels-photo-1251175.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="夜市烟火" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 7: 旅途 -->
                <div class="xg-photo"
                     data-title="旅途"
                     data-subtitle="火车窗外的风景不断变换，旅途中的孤独与期待并存。"
                     data-location="青藏铁路"
                     data-date="2023年夏"
                     data-camera="Canon EOS R5"
                     data-settings="f/4, 1/500s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1043507/pexels-photo-1043507.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="旅途" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 光影建筑 -->
                <div class="xg-photo"
                     data-title="光影建筑"
                     data-subtitle="现代建筑的几何线条在阳光下投射出美丽的光影图案。"
                     data-location="深圳"
                     data-date="2023年冬"
                     data-camera="Fujifilm GFX 100S"
                     data-settings="f/11, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/278736/pexels-photo-278736.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="光影建筑" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 9: 公交车上 -->
                <div class="xg-photo"
                     data-title="公交车上"
                     data-subtitle="公交车里低头看手机的乘客，每个人都沉浸在自己的世界里。"
                     data-location="杭州"
                     data-date="2022年冬"
                     data-camera="Sony A7III"
                     data-settings="f/2, 1/125s, ISO 1200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1166865/pexels-photo-1166865.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="公交车上" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 10: 慵懒午后 -->
                <div class="xg-photo"
                     data-title="慵懒午后"
                     data-subtitle="窗台上晒太阳的猫咪，眯着眼睛享受着温暖的阳光。"
                     data-location="家里"
                     data-date="2023年春"
                     data-camera="Canon EOS R6"
                     data-settings="f/2.8, 1/200s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2510428/pexels-photo-2510428.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="慵懒午后" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 11: 菜市场 -->
                <div class="xg-photo"
                     data-title="菜市场"
                     data-subtitle="清晨的菜市场充满了生机，摊贩的吆喝声和讨价还价的热闹场景。"
                     data-location="重庆"
                     data-date="2022年夏"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/4, 1/250s, ISO 800">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1477425/pexels-photo-1477425.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="菜市场" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 12: 城市天台 -->
                <div class="xg-photo"
                     data-title="城市天台"
                     data-subtitle="站在城市高楼的天台，俯瞰城市的万家灯火，感受到现代都市的脉搏。"
                     data-location="上海陆家嘴"
                     data-date="2023年夏"
                     data-camera="Sony A7R IV"
                     data-settings="f/8, 1/30s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2417726/pexels-photo-2417726.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="城市天台" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 13: 阅读时光 -->
                <div class="xg-photo"
                     data-title="阅读时光"
                     data-subtitle="图书馆一角，阳光透过窗户洒在书页上，时间仿佛静止了。"
                     data-location="国家图书馆"
                     data-date="2023年冬"
                     data-camera="Canon EOS R5"
                     data-settings="f/2.8, 1/100s, ISO 600">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/135620/pexels-photo-135620.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="阅读时光" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 14: 海边夕阳 -->
                <div class="xg-photo"
                     data-title="海边夕阳"
                     data-subtitle="海边的夕阳把天空染成金红色，远处的灯塔在余晖中静静守望。"
                     data-location="厦门鼓浪屿"
                     data-date="2022年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/11, 1/60s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="海边夕阳" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 15: 外卖骑手 -->
                <div class="xg-photo"
                     data-title="外卖骑手"
                     data-subtitle="风雨无阻的外卖骑手，穿梭在城市的大街小巷，为生活奔波。"
                     data-location="北京"
                     data-date="2023年夏"
                     data-camera="Sony A7III"
                     data-settings="f/2.8, 1/500s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/2524365/pexels-photo-2524365.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="外卖骑手" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 16: 路灯下 -->
                <div class="xg-photo"
                     data-title="路灯下"
                     data-subtitle="夜晚的路灯拉出长长的影子，街道显得格外宁静而富有诗意。"
                     data-location="南京"
                     data-date="2022年冬"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/2, 1/30s, ISO 3200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1223649/pexels-photo-1223649.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="路灯下" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Back Button -->
        <a href="../photos.html" class="xg-back" aria-label="返回相册">
            <span class="xg-back-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </span>
            <span class="xg-back-text">返回</span>
        </a>

        <!-- Photo Counter -->
        <div class="xg-counter" aria-live="polite">
            <span class="xg-counter-current">01</span>
            <span class="xg-counter-separator">/</span>
            <span class="xg-counter-total">16</span>
        </div>

        <!-- Info Panel -->
        <div class="xg-info" role="region" aria-label="照片信息">
            <h2 class="xg-title"></h2>
            <p class="xg-subtitle"></p>
            <div class="xg-divider"></div>
            <div class="xg-metadata">
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </span>
                    <div class="xg-meta-content">
                        <span class="xg-meta-label">位置</span>
                        <span class="xg-meta-value" data-field="location"></span>
                    </div>
                </div>
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </span>
                    <div class="xg-meta-content">
                        <span class="xg-meta-label">时间</span>
                        <span class="xg-meta-value" data-field="date"></span>
                    </div>
                </div>
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </span>
                    <div class="xg-meta-content">
                        <span class="xg-meta-label">相机</span>
                        <span class="xg-meta-value" data-field="camera"></span>
                    </div>
                </div>
                <div class="xg-meta-item">
                    <span class="xg-meta-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </span>
                    <div class="xg-meta-content">
                        <span class="xg-meta-label">参数</span>
                        <span class="xg-meta-value" data-field="settings"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Info Toggle Button -->
        <button class="xg-info-toggle" aria-label="显示照片信息">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
        </button>

        <!-- Navigation -->
        <div class="xg-nav visible" role="navigation" aria-label="照片导航">
            <button class="xg-nav-btn xg-prev" aria-label="上一张" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"/>
                </svg>
            </button>
            <button class="xg-nav-btn xg-next" aria-label="下一张">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>

        <!-- Progress Bar -->
        <div class="xg-progress visible" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="16">
            <div class="xg-progress-track">
                <div class="xg-progress-fill" style="width: 6.25%"></div>
            </div>
            <div class="xg-progress-segments">
                <div class="xg-progress-segment active"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
                <div class="xg-progress-segment"></div>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="xg-scroll-indicator visible">
            <span class="xg-scroll-text">向下滚动探索</span>
            <div class="xg-scroll-icon"></div>
        </div>

        <!-- Keyboard Hints -->
        <div class="xg-keyboard-hints" aria-label="键盘快捷键">
            <div class="xg-hint">
                <kbd class="xg-hint-key">↑</kbd>
                <kbd class="xg-hint-key">↓</kbd>
                <span class="xg-hint-label">翻页</span>
            </div>
            <div class="xg-hint">
                <kbd class="xg-hint-key">i</kbd>
                <span class="xg-hint-label">信息</span>
            </div>
            <div class="xg-hint">
                <kbd class="xg-hint-key">f</kbd>
                <span class="xg-hint-label">全屏</span>
            </div>
            <div class="xg-hint">
                <kbd class="xg-hint-key">Esc</kbd>
                <span class="xg-hint-label">关闭</span>
            </div>
        </div>

        <!-- Zoom Overlay -->
        <div class="xg-zoom-overlay" aria-hidden="true">
            <div class="xg-zoom-container">
                <img class="xg-zoom-image" src="" alt="">
            </div>
            <button class="xg-zoom-close" aria-label="关闭">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

    </div>

    <!-- Scripts -->
    <script src="../assets/js/image-error-handler.js"></script>
    <script src="../assets/js/xinjiang-gallery.js"></script>
</body>
</html>

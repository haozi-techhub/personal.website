                <!-- Photo 1: 都市角落的片刻 -->

                     data-title="都市角落的片刻"
                     data-subtitle="图中展现了一家室内场所的场景，人们穿着各式冬装，有的坐着有的站着。坐着的人有的在看杂志，有的似乎在思考。站着的人中，一位穿着印有 "ESSENTIALS" 字样的衣服，环境灯光温暖，充满了都市生活气息。"
                     data-location="北京798艺术区"
                     data-date="2023年春"
                     data-camera="Sony A7III"
                     data-settings="f/2.8, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447719/pexels-photo-31447719.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="都市角落的片刻" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 悬浮都市下的身影 -->
                <div class="xg-photo"
                     data-title="悬浮都市下的身影"
                     data-subtitle="这张图以俯拍视角呈现，一个身着白色上衣的人站在灰色地面上，上方悬浮着几栋高楼模型，画面营造出一种奇幻且略带超现实的氛围，仿佛在展现城市空间中人与建筑的独特关系。"
                     data-location="上海外滩"
                     data-date="2022年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/4, 1/160s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447718/pexels-photo-31447718.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="悬浮都市下的身影" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 外卖小哥 -->
                <div class="xg-photo"
                     data-title="外卖小哥"
                     data-subtitle="图中展现了城市街道的场景，一位戴着蓝色头盔的人骑着摩托车，车上绑着大大的蓝色包裹。周围有其他行人和车辆，远处可见高楼和高架桥，交通信号灯显示红灯，呈现出忙碌的都市日常。"
                     data-location="杭州西湖"
                     data-date="2023年冬"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/2, 1/250s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447524/pexels-photo-31447524.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="外卖小哥" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 林间的温馨时光 -->
                <div class="xg-photo"
                     data-title="林间的温馨时光"
                     data-subtitle="画面中，阳光透过树林洒在草地上，形成斑驳光影。一个成年人和一个小孩在林间漫步，周围树木林立，山坡上覆盖着绿植，氛围宁静而温馨，展现出人与自然和谐相处的美好场景。"
                     data-location="上海南京路"
                     data-date="2022年夏"
                     data-camera="Canon EOS R5"
                     data-settings="f/8, 1/1000s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447526/pexels-photo-31447526.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="林间的温馨时光" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 长廊中的片刻 -->
                <div class="xg-photo"
                     data-title="长廊中的片刻"
                     data-subtitle="画面透过中式建筑的框架，展现一男一女坐在长廊的栏杆上。男子穿着蓝外套和卡其色裤子，似乎在做手势；女子穿着黑色厚外套，背对镜头。外面柳树成荫，远处可见白墙，整体氛围宁静，充满生活气息。"
                     data-location="北京三里屯"
                     data-date="2023年夏"
                     data-camera="Sony A7R IV"
                     data-settings="f/5.6, 1/125s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447726/pexels-photo-31447726.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="长廊中的片刻" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 6: 夜幕下的烟火老街 -->
                <div class="xg-photo"
                     data-title="夜幕下的烟火老街"
                     data-subtitle="暮色时分，古式建筑的店铺亮起灯光，红灯笼高高挂起，透着浓浓的烟火气。街道上车辆穿梭，行人往来，周围树木的枝叶在画面中勾勒出自然的轮廓，一幅充满生活韵味的街头夜景图就此呈现。"
                     data-location="广州上下九"
                     data-date="2022年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/4, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447721/pexels-photo-31447721.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="夜幕下的烟火老街" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 7: 街角的"歡喜"小店 -->
                <div class="xg-photo"
                     data-title="街角的"歡喜"小店"
                     data-subtitle="这是一家名为 "歡喜" 的店铺外景，主营香、茶、器。灰白色砖墙上挂着木质招牌，旁边的遮阳篷下，一串带红流苏的葫芦饰品垂落着。阳光洒落，给场景增添了几分温馨与古朴的氛围。"
                     data-location="广州珠江新城"
                     data-date="2023年春"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/4, 1/320s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447725/pexels-photo-31447725.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="街角的歡喜小店" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 树影下的建筑一隅 -->
                <div class="xg-photo"
                     data-title="树影下的建筑一隅"
                     data-subtitle="画面中，一栋建筑的外立面上安装着多个空调外机，墙面略显陈旧。一旁大树枝叶繁茂，部分树枝伸展至建筑上方，阳光透过树叶洒下，营造出一种静谧且充满生活气息的氛围。"
                     data-location="云南大理"
                     data-date="2022年夏"
                     data-camera="Canon EOS R6"
                     data-settings="f/5.6, 1/400s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447722/pexels-photo-31447722.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="树影下的建筑一隅" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                     data-title="暮河游影"
                     data-subtitle="画面展现了黄昏时分的河上景色，天空被染成橙红色与灰黑色，垂柳低垂。河中许多游船载着乘客，岸边还有人群，整体氛围浪漫且富有诗意，仿佛是一处供人们休闲游览的好去处。"
                     data-location="银淀桥"
                     data-date="2023年冬"
                     data-camera="Sony A7R IV"
                     data-settings="f/2.8, 1/60s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447720/pexels-photo-31447720.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="暮河游影" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                     data-subtitle="画面中，一盏路灯的光芒穿透树枝与树叶，树叶被染成暖黄色，与深蓝色的天空形成鲜明对比。光影交错，营造出一种静谧又略带梦幻的氛围，仿佛现实与超现实在此融合。"

                    </div>

                <!-- Photo 14: 自然之旅 -->

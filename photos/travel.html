                <!-- Photo 1: 通向雪山的公路 -->
                <div class="xg-photo active"
                     data-title="通向雪山的公路"
                     data-subtitle="一条宽阔的公路向前延伸，两旁整齐排列着路灯，路上有车辆行驶。远处是连绵的雪山，蓝天映衬下，雪山显得格外壮丽，展现出一种开阔且震撼的美，仿佛透着陌生地域的独特风情。"
                     data-location="北京798艺术区"
                     data-date="2023年春"
                     data-camera="Sony A7III"
                     data-settings="f/2.8, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447532/pexels-photo-31447532.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="通向雪山的公路" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 玉渊潭 -->
                <div class="xg-photo"
                     data-title="玉渊潭"
                     data-subtitle="这张图片展示了一座高耸的电视塔，塔身线条简洁，顶部有天线装置。塔的周围是盛开白色花朵的树木，蓝天为背景，整体画面清新，可能是北京的中央电视塔。"
                     data-location="上海外滩"
                     data-date="2022年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/4, 1/160s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447822/pexels-photo-31447822.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="玉渊潭" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 雪域公路之行 -->
                <div class="xg-photo"
                     data-title="雪域公路之行"
                     data-subtitle="图中展现了一条高速公路，路上有两辆白色轿车行驶。公路旁是覆盖着白雪的山脉和地面，蓝天映衬，视野开阔，呈现出一种冷峻而壮阔的美，仿佛是在高原或寒冷山区的行车途中。"
                     data-location="杭州西湖"
                     data-date="2023年冬"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/2, 1/250s, ISO 400">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447533/pexels-photo-31447533.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="雪域公路之行" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 檐下柿韵 -->
                <div class="xg-photo"
                     data-title="檐下柿韵"
                     data-subtitle="旅画面中，蓝天为背景，中式古建筑的飞檐翘角旁，挂着铃铛，檐上有一排小兽。旁边一棵柿子树，树枝上挂满橙红色的柿子，展现出传统与自然交融的美好画面。"
                     data-location="泰国清迈"
                     data-date="2022年夏"
                     data-camera="Canon EOS R5"
                     data-settings="f/8, 1/1000s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447536/pexels-photo-31447536.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="檐下柿韵" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 多彩丹霞山脉 -->
                <div class="xg-photo"
                     data-title="多彩丹霞山脉"
                     data-subtitle="这张图片展示了色彩丰富的丹霞地貌山脉，山体呈现出棕红色、土黄色等多种色调，层次分明。山脉连绵起伏，远处有一片树林，蓝天为背景，尽显大自然的雄浑壮美。"
                     data-location="意大利威尼斯"
                     data-date="2023年夏"
                     data-camera="Sony A7R IV"
                     data-settings="f/5.6, 1/125s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447535/pexels-photo-31447535.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="多彩丹霞山脉" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                     data-title="古建晨烟"
                     data-subtitle="画面中是一座中式古建筑，橙红色的屋顶和木质墙面显得古朴庄重。阳光透过树枝洒下，一旁有棵光秃秃的树，建筑前烟雾袅袅，营造出一种神秘而宁静的氛围，可能是一处寺庙或道观。"
                     data-location="美国大峡谷"
                     data-date="2022年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/4, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447538/pexels-photo-31447538.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="古建晨烟" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 7: 湖畔秋韵 -->
                <div class="xg-photo"
                     data-title="湖畔秋韵"
                     data-subtitle="这张照片展现了秋日的湖景，前景是垂下的柳枝，部分叶子泛黄。湖面上有游船和一只水鸟，远处小山上矗立着一座白塔，可能是北京北海公园，画面宁静优美。"
                     data-location="广州珠江新城"
                     data-date="2023年春"
                     data-camera="Fujifilm X-T4"
                     data-settings="f/4, 1/320s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447537/pexels-photo-31447537.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="湖畔秋韵" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 古建与湖景 -->

                     data-title="古建与湖景"
                     data-subtitle="图中展示了中式古建筑的屋顶，色彩丰富，有橙色、蓝色琉璃瓦。远处是开阔的水面，上面有几艘游船，周围绿树环绕，可能是一处著名的古典园林景区，展现出人文景观与自然的融合之美。"
                     data-location="云南大理"
                     data-date="2022年夏"
                     data-camera="Canon EOS R6"
                     data-settings="f/5.6, 1/400s, ISO 100">

                    </div>
                </div>

                     data-date="2023年冬"
                     data-camera="Sony A7R IV"

                <!-- Photo 1: 平遥古城 -->
                <div class="xg-photo active"
                     data-title="平遥古城"
                     data-subtitle="千年古城俯瞰，方正的城墙环抱着历史的沉淀，砖瓦间流淌着中华文明的智慧，每一条街巷都是时光的印记。"
                     data-location="山西省平遥县"
                     data-date="2023年春"
                     data-camera="Canon EOS R5"
                     data-settings="f/8, 1/500s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31459215/pexels-photo-31459215.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="平遥古城" loading="eager">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 2: 平遥古城 -->
                <div class="xg-photo"
                     data-title="平遥古城"
                     data-subtitle="这依然是平遥古城的航拍景象。蜿蜒的古城墙清晰可见，墙体厚实古朴。城墙内是错落的传统民居建筑，屋顶多为灰色调。城墙外有道路和停车场，停放着不少车辆，展现出古城历史韵味与现代生活交融的画面。"
                     data-location="云南省"
                     data-date="2023年夏"
                     data-camera="Canon EOS R5"
                     data-settings="f/11, 1/250s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31459216/pexels-photo-31459216.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="平遥古城" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 3: 北平的秋 -->
                <div class="xg-photo"
                     data-title="北平的秋"
                     data-subtitle="这是一幅秋景图，画面中是一片金黄色的银杏树林，树叶挂满枝头，地上也铺满落叶。林间有行人漫步，还有路灯等设施。"
                     data-location="上海浦东"
                     data-date="2022年冬"
                     data-camera="Sony A7R IV"
                     data-settings="f/16, 1/60s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31459238/pexels-photo-31459238.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="北平的秋" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 4: 祁连山 -->
                <div class="xg-photo"
                     data-title="祁连山"
                     data-subtitle="图中远处是连绵的雪山，山脚下是开阔的平地，地面上有一些建筑、车辆，还插着许多旗帜，路边有电线杆等设施。"
                     data-location="祁连山"
                     data-date="2023年秋"
                     data-camera="Canon EOS R5"
                     data-settings="f/13, 1/125s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447436/pexels-photo-31447436.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="祁连山" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 5: 昆仑山 -->
                <div class="xg-photo"
                     data-title="昆仑山"
                     data-subtitle="画面展现了高原风光，远处是巍峨的雪山，近处有铁路、高压电塔，一辆火车正在铁轨上行驶，地面是广袤的荒原。"
                     data-location="青海茶卡盐湖"
                     data-date="2022年夏"
                     data-camera="Sony A7S III"
                     data-settings="f/2.8, 20s, ISO 3200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447439/pexels-photo-31447439.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="昆仑山" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 6: U型公路 -->
                <div class="xg-photo"
                     data-title="U型公路"
                     data-subtitle="这是一条穿行在沙漠地貌中的公路，路面宽阔，路上有多辆行驶的车辆，路边也停着一些车，还有行人。公路两侧是起伏的沙丘，远处能看到通信塔等设施。"
                     data-location="四川贡嘎山"
                     data-date="2023年冬"
                     data-camera="Canon EOS R5"
                     data-settings="f/11, 1/200s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447437/pexels-photo-31447437.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="U型公路" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 7: 青海湖 -->
                <div class="xg-photo"
                     data-title="青海湖"
                     data-subtitle="图中展现了海鸥在水面上方飞翔的场景，天空中有白云，海水波光粼粼。画面传递出自然和谐之美。"
                     data-location="云南元阳"
                     data-date="2022年春"
                     data-camera="Nikon Z7 II"
                     data-settings="f/8, 1/320s, ISO 64">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447435/pexels-photo-31447435.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="青海湖" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 8: 沙漠落日 -->
                <div class="xg-photo"
                     data-title="沙漠落日"
                     data-subtitle="图中是一片风力发电场，多个巨大的白色风力发电机矗立在空旷的荒漠地带，远处是朦胧的天际线。"
                     data-location="内蒙古巴丹吉林"
                     data-date="2023年秋"
                     data-camera="Sony A7R V"
                     data-settings="f/16, 1/125s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447434/pexels-photo-31447434.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="沙漠落日" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 9: 青海湖 -->
                <div class="xg-photo"
                     data-title="青海湖"
                     data-subtitle="画面中一匹棕色的马在金黄的草原上低头吃草，远处是湛蓝的湖水，草原边缘有围栏和小建筑。整体场景宁静开阔。"
                     data-location="甘肃张掖"
                     data-date="2022年夏"
                     data-camera="Canon EOS R3"
                     data-settings="f/11, 1/250s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/31447432/pexels-photo-31447432.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="青海湖" loading="lazy">

                    </div>
                </div>

                     data-date="2023年夏"
                     data-camera="Fujifilm GFX 100S"
                     data-settings="f/16, 1/60s, ISO 50">

                    </div>

                    </div>

                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <div class="xg-photo"

                     data-date="2022年秋"
                     data-camera="Nikon Z7 II"
                     data-settings="f/11, 1/125s, ISO 100">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1405528/pexels-photo-1405528.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="云海日出" loading="lazy">
                        <div class="xg-photo-loader"></div>
                    </div>
                </div>

                <!-- Photo 14: 层层叠翠 -->

                     data-date="2023年春"
                     data-camera="Canon EOS R3"
                     data-settings="f/8, 1/200s, ISO 200">
                    <div class="xg-photo-inner">
                        <img src="https://images.pexels.com/photos/1141853/pexels-photo-1141853.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="层层叠翠" loading="lazy">

                    </div>
                </div>

                     data-location="内蒙古锡林郭勒"
                     data-date="2023年夏"
                     data-camera="Fujifilm GFX 100S"

                    </div>
                </div>

                     data-date="2022年冬"
                     data-camera="Sony A7S III"

                        <img src="https://images.pexels.com/photos/2506923/pexels-photo-2506923.jpeg?auto=compress&cs=tinysrgb&w=1920&q=90" alt="极光之旅" loading="lazy">

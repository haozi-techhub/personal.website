<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新疆摄影 | 任文浩的个人主页</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="styles/background.css">
    <link rel="stylesheet" href="styles/photography.css">
    <link rel="stylesheet" href="styles/fullscreen-gallery.css">
</head>
<body>
    <!-- 返回按钮 -->
    <a href="photos.html" class="back-button">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- 全屏画廊容器 -->
    <div class="fullscreen-gallery">
        <!-- 占位照片项 1 -->
        <div class="fullscreen-photo-item">
            <div class="fullscreen-photo-wrapper">
                <img src="https://images.pexels.com/photos/3408354/pexels-photo-3408354.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2" alt="新疆风光">
            </div>
            <div class="photo-description">
                <h2 class="photo-title">待添加</h2>
                <p class="photo-subtitle">新疆摄影作品展示区域，拍摄后将照片替换此处即可。</p>
                <div class="photo-details">
                    <div class="photo-detail-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>新疆</span>
                    </div>
                    <div class="photo-detail-item">
                        <i class="fas fa-calendar-alt"></i>
                        <span>待定</span>
                    </div>
                    <div class="photo-detail-item">
                        <i class="fas fa-camera"></i>
                        <span>-</span>
                    </div>
                    <div class="photo-detail-item">
                        <i class="fas fa-sliders-h"></i>

                    </div>
                </div>
            </div>
        </div>

                </div>

            <div class="fullscreen-photo-wrapper">
                <img src="https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2" alt="新疆风光">
            </div>

        </a>
    </div>

</html>
